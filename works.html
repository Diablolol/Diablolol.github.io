<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ผลงานทั้งหมด | Portfolio</title>

<meta name="description" content="รวมผลงานบริการ เขียนบทความ SEO ออกแบบกราฟิก พัฒนาเว็บไซต์ การตลาด Data Analytics และอื่นๆ">

<style>

:root{
--bg:#ffffff;
--text:#111111;
--card:#f4f4f4;
--accent:#4f46e5;
}

body.dark{
--bg:#0f172a;
--text:#f8fafc;
--card:#1e293b;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
border-bottom:1px solid #ddd;
}

h1{
margin:0;
}

.toggle{
padding:8px 14px;
cursor:pointer;
border-radius:6px;
border:none;
background:var(--accent);
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:var(--card);
padding:20px;
border-radius:10px;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
margin-top:0;
}

.category{
margin-bottom:40px;
}

.category h2{
margin-bottom:20px;
border-left:5px solid var(--accent);
padding-left:10px;
}

</style>

</head>
<body>

<header>

<h1>ผลงานทั้งหมด</h1>

<button class="toggle" onclick="toggleMode()">
🌙 Dark Mode
</button>

</header>

<div class="container" id="portfolioContainer"></div>


<script>

const services = {

seo:[
{title:"บทความ SEO ธุรกิจท่องเที่ยว"},
{title:"บทความ SEO ร้านอาหาร"},
{title:"บทความ SEO เทคโนโลยี"}
],

graphic:[
{title:"ออกแบบ Banner Facebook"},
{title:"ออกแบบ Logo"},
{title:"ออกแบบ Branding"}
],

poster:[
{title:"โปสเตอร์โปรโมทสินค้า"},
{title:"โปสเตอร์อีเวนต์"},
{title:"โปสเตอร์โฆษณา"}
],

web:[
{title:"เว็บไซต์บริษัท"},
{title:"Landing Page"},
{title:"E-commerce"}
],

data:[
{title:"Dashboard วิเคราะห์ยอดขาย"},
{title:"Data Visualization"},
{title:"Business Analytics"}
],

marketing:[
{title:"วางแผน Digital Marketing"},
{title:"SEO Strategy"},
{title:"Social Media Campaign"}
],

photo:[
{title:"ถ่ายภาพสินค้า"},
{title:"ถ่ายวิดีโอโฆษณา"},
{title:"ตัดต่อวิดีโอโปรโมท"}
],

organization:[
{title:"จัดอีเวนต์บริษัท"},
{title:"จัดงานสัมมนา"},
{title:"จัดกิจกรรมองค์กร"}
],

translation:[
{title:"แปลเอกสารธุรกิจ"},
{title:"แปลเว็บไซต์"},
{title:"แปลบทความ"}
],

mockup:[
{title:"Creative Packaging Mockup"},
{title:"Product Mockup"},
{title:"Brand Mockup"}
]

}


const serviceNames = {

seo:"เขียนบทความ SEO",
graphic:"ออกแบบกราฟิก",
poster:"ทำโปสเตอร์",
web:"เขียนเว็บไซต์",
data:"Data Analytics",
marketing:"Marketing",
photo:"Photography / Video",
organization:"Organization",
translation:"แปลภาษา",
mockup:"Creative Mockup"

}


const container=document.getElementById("portfolioContainer")

Object.keys(services).forEach(key=>{

const category=document.createElement("div")
category.className="category"

let html=`<h2>${serviceNames[key]}</h2>`
html+=`<div class="grid">`

services[key].forEach(item=>{
html+=`
<div class="card">
<h3>${item.title}</h3>
<p>${serviceNames[key]}</p>
</div>
`
})

html+=`</div>`
category.innerHTML=html

container.appendChild(category)

})


function toggleMode(){

document.body.classList.toggle("dark")

const btn=document.querySelector(".toggle")

if(document.body.classList.contains("dark")){
btn.innerText="☀️ Light Mode"
}else{
btn.innerText="🌙 Dark Mode"
}

}

</script>

</body>
</html>

<!doctype html>
<html lang="th" class="h-full scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผลงานทั้งหมด | พีรัชชัย</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-font: 'Instrument Sans', sans-serif; }
        body { font-family: var(--primary-font); }
        .portfolio-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .portfolio-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-slate-50 flex flex-col min-h-full">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="index.html" class="flex items-center text-slate-900 hover:text-blue-600 transition-colors">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    <span class="font-bold text-lg">กลับหน้าหลัก</span>
                </a>
                <div class="text-slate-400 text-sm">All Portfolio Projects</div>
            </div>
        </div>
    </nav>

    <header class="bg-white py-12 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h1 class="text-3xl font-bold text-slate-900">คลังผลงานทั้งหมด</h1>
            <p class="mt-2 text-slate-600">รวบรวมโปรเจกต์และประสบการณ์การทำงานที่ผ่านมา</p>
        </div>
    </header>

    <div class="bg-white border-b border-slate-200 sticky top-16 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex flex-wrap gap-2">
                <button class="px-4 py-2 bg-blue-600 text-white rounded-full text-sm font-medium">ทั้งหมด</button>
                <button class="px-4 py-2 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-full text-sm font-medium transition-colors">Web Development</button>
                <button class="px-4 py-2 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-full text-sm font-medium transition-colors">SEO & Marketing</button>
                <button class="px-4 py-2 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-full text-sm font-medium transition-colors">Design</button>
            </div>
        </div>
    </div>

    <main class="flex-grow py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                
                <div class="portfolio-card bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm flex flex-col items-center justify-center p-12 border-dashed border-2">
                    <div class="text-slate-300 mb-4">
                        <svg class="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    </div>
                    <p class="text-slate-400 font-medium text-center">กำลังเตรียมข้อมูลผลงานเพิ่มเติม...</p>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 py-8">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-slate-500 text-sm">&copy; <span id="copyright-year"></span> พีรัชชัย. All rights reserved.</p>
        </div>
    </footer>

    <script id="full-portfolio-data" type="application/json">
    {
        "projects": []
    }
    </script>

    <script>
        document.getElementById('copyright-year').textContent = new Date().getFullYear();
        
        // ตรงนี้คือที่สำหรับเขียน Algorithm ในการดึงข้อมูลจาก JSON 
        // มาสร้างเป็น Card แบบอัตโนมัติ (Dynamic Rendering)
    </script>
</body>
</html>

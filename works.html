
<!doctype html>
<html lang="th" class="h-full scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Production</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Instrument Sans', 'Noto Sans Thai', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Instrument Sans', 'Noto Sans Thai', sans-serif;
    }
    .glass-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      transition: all 0.3s ease;
    }
    .glass-card:hover {
      transform: translateY(-6px);
    }
    .gradient-text {
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>

<body class="bg-slate-950 text-slate-100">

<nav class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800">
  <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
    <a href="index.html" class="font-bold hover:text-indigo-400">← กลับหน้าหลัก</a>
    <!-- <button id="themeToggle" class="p-2 bg-slate-800 rounded">🌙</button> -->
  </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-12">
  <header class="text-center mb-12">
    <h1 class="text-4xl font-bold gradient-text">ผลงานทั้งหมด</h1>
    <p class="text-slate-400 mt-2">Production Portfolio</p>
  </header>

  <input id="search" placeholder="ค้นหาผลงาน..." class="w-full mb-6 p-3 rounded bg-slate-800"/>

  <div id="categoryContainer" class="flex flex-wrap gap-3 mb-10"></div>
  <div id="portfolioGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</main>

<script>
const services = {
  seo:{icon:'📝',label:'SEO',items:[{title:'SEO Article',desc:'Optimize ranking'}]},
  web:{icon:'💻',label:'Web',items:[{title:'Website Dev',desc:'Fullstack dev'}]},
  design:{icon:'🎨',label:'Design',items:[{title:'UI Design',desc:'Modern UI'}]}
};

let activeCategory='all';

function renderCategories(){
  let html='<button onclick="filterCategory(\'all\')" class="px-3 py-2 bg-indigo-500 rounded">All</button>';
  Object.entries(services).forEach(([k,v])=>{
    html+=`<button onclick="filterCategory('${k}')" class="px-3 py-2 bg-slate-800 rounded">${v.icon} ${v.label}</button>`;
  });
  document.getElementById('categoryContainer').innerHTML=html;
}

function renderPortfolio(){
  const grid=document.getElementById('portfolioGrid');
  const search=document.getElementById('search').value.toLowerCase();
  let html='';

  const data = activeCategory==='all'?Object.values(services):[services[activeCategory]];

  data.forEach(cat=>{
    cat.items.forEach(item=>{
      if(item.title.toLowerCase().includes(search)){
        html+=`<div class="glass-card p-4 rounded">
          <div>${cat.icon}</div>
          <h3 class="font-bold">${item.title}</h3>
          <p class="text-sm text-slate-400">${item.desc}</p>
        </div>`;
      }
    });
  });

  grid.innerHTML=html;
}

function filterCategory(cat){
  activeCategory=cat;
  renderPortfolio();
}

document.getElementById('search').addEventListener('input',renderPortfolio);

document.getElementById('themeToggle').onclick=()=>{
  document.documentElement.classList.toggle('dark');
};

renderCategories();
renderPortfolio();
</script>

</body>
</html>

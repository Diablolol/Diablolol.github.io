    <script>
        // 1. Theme Logic
        const themeBtn = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('theme-toggle-light-icon');
        const moonIcon = document.getElementById('theme-toggle-dark-icon');

        const updateIcons = () => {
            if (document.documentElement.classList.contains('dark')) {
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        };

        themeBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            updateIcons();
        });

        // 2. Render Logic
        function renderProjects(filter = 'all') {
            const grid = document.getElementById('portfolio-grid');
            const data = JSON.parse(document.getElementById('portfolio-data').textContent);
            grid.innerHTML = '';

            const filteredItems = filter === 'all' 
                ? data.items 
                : data.items.filter(item => item.category === filter);

            filteredItems.forEach(item => {
                const cardHtml = `
                    <div class="portfolio-card bg-white dark:bg-slate-800 rounded-[2.5rem] border border-slate-100 dark:border-slate-700 overflow-hidden flex flex-col h-full group">
                        <div class="aspect-video relative overflow-hidden bg-slate-100 dark:bg-slate-700">
                            <img src="${item.img}" alt="${item.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
                            <div class="absolute top-4 right-4">
                                <span class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-bold text-blue-600 dark:text-blue-400 uppercase tracking-tighter">
                                    ${item.service}
                                </span>
                            </div>
                        </div>
                        <div class="p-8 flex-grow">
                            <h3 class="text-xl font-bold text-slate-900 dark:text-white leading-tight">${item.title}</h3>
                            <p class="mt-3 text-slate-600 dark:text-slate-400 text-sm leading-relaxed line-clamp-3">${item.desc}</p>
                        </div>
                        <div class="px-8 pb-8 mt-auto">
                            <button class="w-full py-4 bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-xs font-bold rounded-2xl hover:bg-blue-600 dark:hover:bg-blue-400 dark:hover:text-white transition-all uppercase tracking-widest shadow-lg shadow-slate-200 dark:shadow-none">
                                View Full Project
                            </button>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // 3. Filter Execution
        function filterProjects(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-blue-600', 'text-white');
                btn.classList.add('bg-white', 'dark:bg-slate-800', 'text-slate-600');
            });
            event.currentTarget.classList.add('active');
            renderProjects(category);
        }

        // Init
        updateIcons();
        document.getElementById('year').textContent = new Date().getFullYear();
        renderProjects();
    </script>

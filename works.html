<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ผลงานทั้งหมด | Portfolio</title>

<meta name="description" content="รวมผลงานบริการ SEO Graphic Website Marketing Data Analytics และอื่นๆ">

<style>

:root{
--bg:#ffffff;
--text:#111;
--card:#f5f5f5;
--accent:#6366f1;
--border:#ddd;
}

body.dark{
--bg:#0f172a;
--text:#f1f5f9;
--card:#1e293b;
--border:#334155;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
transition:.3s;
}

header{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:space-between;
align-items:center;
padding:20px;
border-bottom:1px solid var(--border);
}

h1{
margin:0;
font-size:22px;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
}

input,select{
padding:8px 10px;
border-radius:6px;
border:1px solid var(--border);
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
background:var(--accent);
color:white;
cursor:pointer;
}

.container{
max-width:1200px;
margin:auto;
padding:30px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

.card{
background:var(--card);
border-radius:12px;
padding:20px;
transition:.3s;
cursor:pointer;
border:1px solid var(--border);
}

.card:hover{
transform:translateY(-5px);
}

.icon{
width:40px;
height:40px;
margin-bottom:10px;
}

.card h3{
margin:10px 0 5px 0;
}

.category{
font-size:13px;
opacity:.7;
}

</style>

</head>

<body>

<header>

<h1>Portfolio ผลงานทั้งหมด</h1>

<div class="controls">

<input id="searchInput" type="text" placeholder="ค้นหาผลงาน...">

<select id="serviceFilter">
<option value="all">ทุกบริการ</option>
<option value="seo">เขียนบทความ SEO</option>
<option value="graphic">ออกแบบกราฟิก</option>
<option value="poster">ทำโปสเตอร์</option>
<option value="web">เขียนเว็บไซต์</option>
<option value="data">Data Analytics</option>
<option value="marketing">Marketing</option>
<option value="photo">Photography / Video</option>
<option value="organization">Organization</option>
<option value="translation">แปลภาษา</option>
<option value="mockup">Creative Mockup</option>
</select>

<button onclick="toggleMode()">🌙</button>

</div>

</header>


<div class="container">

<div class="grid" id="portfolioGrid"></div>

</div>


<script>

const servicesData = [

{title:"บทความ SEO ธุรกิจท่องเที่ยว",service:"seo"},
{title:"บทความ SEO ร้านอาหาร",service:"seo"},

{title:"ออกแบบ Banner Facebook",service:"graphic"},
{title:"ออกแบบ Logo Branding",service:"graphic"},

{title:"โปสเตอร์โปรโมทสินค้า",service:"poster"},
{title:"โปสเตอร์งาน Event",service:"poster"},

{title:"Corporate Website",service:"web"},
{title:"Landing Page ธุรกิจ",service:"web"},

{title:"Dashboard วิเคราะห์ยอดขาย",service:"data"},
{title:"Data Visualization",service:"data"},

{title:"Digital Marketing Strategy",service:"marketing"},
{title:"Social Media Campaign",service:"marketing"},

{title:"ถ่ายภาพสินค้า",service:"photo"},
{title:"ตัดต่อวิดีโอโฆษณา",service:"photo"},

{title:"จัดงานสัมมนาองค์กร",service:"organization"},
{title:"จัดกิจกรรมบริษัท",service:"organization"},

{title:"แปลบทความภาษาอังกฤษ",service:"translation"},
{title:"แปลเว็บไซต์ธุรกิจ",service:"translation"},

{title:"Product Mockup",service:"mockup"},
{title:"Packaging Mockup",service:"mockup"}

]


const serviceNames = {

seo:"เขียนบทความ SEO",
graphic:"ออกแบบกราฟิก",
poster:"ทำโปสเตอร์",
web:"เขียนเว็บไซต์",
data:"Data Analytics",
marketing:"Marketing",
photo:"Photography / Video",
organization:"Organization",
translation:"แปลภาษา",
mockup:"Creative Mockup"

}


const icons = {

seo:`<svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,

graphic:`<svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2a10 10 0 1 0 0 20"/></svg>`,

poster:`<svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16"/></svg>`,

web:`<svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/></svg>`,

data:`<svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="4" y1="20" x2="4" y2="10"/><line x1="10" y1="20" x2="10" y2="4"/><line x1="16" y1="20" x2="16" y2="14"/></svg>`,

marketing:`<svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 11l18-5v12l-18-5z"/></svg>`,

photo:`<svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13"/><circle cx="12" cy="13" r="4"/></svg>`,

organization:`<svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M17 11v6"/></svg>`,

translation:`<svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16M4 12h8M4 20h16"/></svg>`,

mockup:`<svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18"/></svg>`

}


const grid=document.getElementById("portfolioGrid")

function render(){

const search=document.getElementById("searchInput").value.toLowerCase()
const filter=document.getElementById("serviceFilter").value

grid.innerHTML=""

servicesData.forEach(item=>{

if(filter!=="all" && item.service!==filter)return

if(!item.title.toLowerCase().includes(search))return

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

${icons[item.service]}

<h3>${item.title}</h3>

<div class="category">${serviceNames[item.service]}</div>

`

grid.appendChild(card)

})

}

document.getElementById("searchInput").addEventListener("input",render)
document.getElementById("serviceFilter").addEventListener("change",render)

render()


function toggleMode(){

document.body.classList.toggle("dark")

}

</script>

</body>
</html>

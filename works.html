<!doctype html>
<html lang="th" class="h-full scroll-smooth">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

        .portfolio-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .portfolio-card:hover { transform: translateY(-8px); }
        .filter-btn.active { background-color: #2563eb; color: white; border-color: #2563eb; }
        /* ซ่อน Scrollbar สำหรับ Filter */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-900 flex flex-col min-h-full text-slate-900 dark:text-slate-100">

    <nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">

                <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.01 8.01 0 0110.586 10.586z"></path></svg>
            </button>
        </div>
    </nav>

    <header class="bg-white dark:bg-slate-900 py-16 border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 text-center md:text-left">
            <h1 class="text-4xl font-bold text-slate-900 dark:text-white">คลังผลงานทั้งหมด</h1>
            <p class="mt-4 text-lg text-slate-600 dark:text-slate-400 max-w-2xl">รวบรวมโปรเจกต์ที่ผ่านมา ทั้งการพัฒนาเว็บ, การตลาดดิจิทัล, SEO และงานดีไซน์</p>
        </div>
    </header>

    <div class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-16 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex gap-3 overflow-x-auto no-scrollbar">
            <button onclick="filterProjects('all')" class="filter-btn active px-6 py-2 rounded-full text-sm font-medium border border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-800 transition-all">ทั้งหมด</button>
            <button onclick="filterProjects('Web Development')" class="filter-btn px-6 py-2 rounded-full text-sm font-medium border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">Web Dev</button>
            <button onclick="filterProjects('Design')" class="filter-btn px-6 py-2 rounded-full text-sm font-medium border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">Design</button>
            <button onclick="filterProjects('Marketing')" class="filter-btn px-6 py-2 rounded-full text-sm font-medium border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">Marketing</button>
        </div>
    </div>

    <main class="flex-grow py-12 bg-slate-50 dark:bg-slate-950">
        <div class="max-w-7xl mx-auto px-4">
            <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </div>
    </main>

    <footer class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-slate-500 dark:text-slate-400 text-sm">&copy; <span id="copyright-year"></span> พีรัชชัย. All rights reserved.</p>
        </div>
    </footer>

    <script id="portfolio-db" type="application/json">
    {
        "projects": [
            {
                "title": "SEO Strategy & Audit",

                "desc": "เพิ่ม Organic Traffic ให้กับเว็บไซต์ธุรกิจท่องเที่ยวด้วยการวางโครงสร้าง Content ใหม่",
                "image": "https://images.unsplash.com/photo-1432888622747-4eb9a8efeb07?q=80&w=800",
                "link": "#"
            },
            {
                "title": "Modern E-commerce Web",
                "category": "Web Development",
                "desc": "พัฒนาแพลตฟอร์มร้านค้าออนไลน์ด้วยเทคโนโลยี React และ Tailwind CSS รองรับการจ่ายเงินเต็มรูปแบบ",
                "image": "https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=800",
                "link": "#"
            },
            {
                "title": "Corporate Brand Identity",
                "category": "Design",
                "desc": "ออกแบบโลโก้และ Mood & Tone สำหรับบริษัทสตาร์ทอัพทางด้านเทคโนโลยี",
                "image": "https://images.unsplash.com/photo-1561070791-2526d30994b5?q=80&w=800",
                "link": "#"
            },
            {
                "title": "Looker Studio Dashboard",
                "category": "Marketing",
                "desc": "สร้างระบบวิเคราะห์ข้อมูลการตลาดแบบ Real-time เพื่อการตัดสินใจทางธุรกิจที่แม่นยำ",
                "image": "https://images.unsplash.com/photo-1551288049-bbbda536339a?q=80&w=800",
                "link": "#"
            },
            {
                "title": "LMS Learning App",
                "category": "Web Development",
                "desc": "ระบบจัดการเรียนการสอนออนไลน์ พร้อมระบบวิดีโอและควิซทดสอบสำหรับพนักงานองค์กร",
                "image": "https://images.unsplash.com/photo-1501504905252-473c47e087f8?q=80&w=800",
                "link": "#"
            },
            {
                "title": "Social Media Ad Sets",
                "category": "Design",
                "desc": "ชุดงานดีไซน์โฆษณา Facebook และ Instagram ที่ช่วยเพิ่ม Click-through Rate (CTR) กว่า 40%",
                "image": "https://images.unsplash.com/photo-1611162617474-5b21e879e113?q=80&w=800",

    <script>
        // 1. ระบบจัดการ Dark Mode
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        if (document.documentElement.classList.contains('dark')) {
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
        }

        document.getElementById('theme-toggle').addEventListener('click', () => {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');
            if (localStorage.getItem('color-theme') === 'light') {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            }
        });

        // 2. ฟังก์ชัน Render ผลงานจาก JSON
        function renderProjects(filter = 'all') {
            const grid = document.getElementById('portfolio-grid');
            const data = JSON.parse(document.getElementById('portfolio-db').textContent);
            grid.innerHTML = '';

            const filtered = filter === 'all' 
                ? data.projects 
                : data.projects.filter(p => p.category === filter);

            filtered.forEach(project => {
                grid.innerHTML += `
                    <div class="portfolio-card bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-sm flex flex-col h-full">
                        <div class="aspect-video relative overflow-hidden bg-slate-200 dark:bg-slate-700">
                            <img src="${project.image}" alt="${project.title}" class="w-full h-full object-cover transition-transform duration-500 hover:scale-110">
                        </div>
                        <div class="p-6 flex-grow">
                            <span class="text-blue-600 dark:text-blue-400 text-xs font-bold uppercase tracking-widest">${project.category}</span>
                            <h3 class="text-xl font-bold text-slate-900 dark:text-white mt-2 leading-tight">${project.title}</h3>
                            <p class="text-slate-600 dark:text-slate-400 mt-3 text-sm leading-relaxed">${project.desc}</p>
                        </div>
                        <div class="px-6 pb-6">
                            <a href="${project.link}" target="_blank" class="text-slate-900 dark:text-white font-semibold text-sm inline-flex items-center hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                                ดูรายละเอียดโปรเจกต์
                                <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            </a>
                        </div>
                    </div>
                `;
            });
        }

        // 3. ฟังก์ชันตัวกรองผลงาน
        function filterProjects(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-blue-600', 'text-white', 'dark:bg-blue-600');
                btn.classList.add('bg-slate-100', 'dark:bg-slate-800', 'text-slate-600');
            });
            event.currentTarget.classList.add('active');
            renderProjects(category);
        }

        // 4. ตั้งค่าปีลิขสิทธิ์และโหลดข้อมูลครั้งแรก
        document.getElementById('copyright-year').textContent = new Date().getFullYear();
        renderProjects();
    </script>
</body>
</html>

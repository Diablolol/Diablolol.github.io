    <script>
        // 1. Dark Mode Management
        const themeToggle = document.getElementById('theme-toggle');
        const lightIcon = document.getElementById('theme-toggle-light-icon');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');

        const updateIcons = () => {
            if (document.documentElement.classList.contains('dark')) {
                lightIcon.classList.remove('hidden');
                darkIcon.classList.add('hidden');
            } else {
                lightIcon.classList.add('hidden');
                darkIcon.classList.remove('hidden');
            }
        };

        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('color-theme', isDark ? 'dark' : 'light');
            updateIcons();
        });

        // 2. Portfolio Rendering Engine
        function renderProjects(filter = 'all') {
            const grid = document.getElementById('portfolio-grid');
            const data = JSON.parse(document.getElementById('portfolio-db').textContent);
            grid.innerHTML = '';

            const filtered = filter === 'all' 
                ? data.projects 
                : data.projects.filter(p => p.category === filter);

            filtered.forEach(project => {
                grid.innerHTML += `
                    <div class="portfolio-card bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-sm flex flex-col h-full group">
                        <div class="aspect-[16/10] relative overflow-hidden bg-slate-200 dark:bg-slate-700">
                            <img src="${project.image}" alt="${project.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                            <div class="absolute top-4 left-4">
                                <span class="px-3 py-1 bg-white/90 dark:bg-slate-900/90 backdrop-blur text-[10px] font-bold uppercase tracking-widest rounded-full shadow-sm text-blue-600 dark:text-blue-400">
                                    ${project.tag}
                                </span>
                            </div>
                        </div>
                        <div class="p-8 flex-grow">
                            <h3 class="text-xl font-bold text-slate-900 dark:text-white leading-tight mb-3">${project.title}</h3>
                            <p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">${project.desc}</p>
                        </div>
                        <div class="px-8 pb-8">
                            <button class="w-full py-3 bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-white text-xs font-bold rounded-xl border border-slate-200 dark:border-slate-700 hover:bg-blue-600 hover:text-white dark:hover:bg-blue-600 transition-all uppercase tracking-widest">
                                View Case Study
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // 3. Filter Controls
        function filterProjects(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-blue-600', 'text-white', 'dark:bg-blue-600');
                btn.classList.add('bg-white', 'dark:bg-slate-900', 'text-slate-600');
            });
            event.currentTarget.classList.add('active');
            renderProjects(category);
        }

        // Initialize
        updateIcons();
        document.getElementById('copyright-year').textContent = new Date().getFullYear();
        renderProjects();
    </script>
